<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>streetview-dl</title>
<style>
  :root {
    --bg: #0f1720;
    --card: #18232f;
    --line: #2a3a4a;
    --fg: #e6edf3;
    --muted: #8aa0b4;
    --accent: #3b82f6;
    --accent-2: #22c55e;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans",
      "Noto Sans JP", sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2a3a, var(--bg));
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .wrap { width: 100%; max-width: 640px; }
  .topbar { display: flex; justify-content: flex-end; margin-bottom: 8px; }
  .lang { display: inline-flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .lang button {
    background: #0e1620; color: var(--muted); border: 0; padding: 5px 12px;
    font-size: 0.8rem; cursor: pointer; margin: 0; width: auto;
  }
  .lang button.active { background: var(--accent); color: #fff; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0 0 6px; }
  textarea, select {
    width: 100%;
    background: #0e1620;
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 76px; line-height: 1.4; }
  textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .row { display: flex; gap: 12px; margin-top: 16px; }
  .row > div { flex: 1; }
  #go {
    margin-top: 20px;
    width: 100%;
    background: var(--accent);
    color: white;
    border: 0;
    border-radius: 10px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  #go:hover { background: #2f6fd6; }
  #go:disabled { opacity: 0.55; cursor: not-allowed; }
  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 14px; line-height: 1.5; }

  #status { margin-top: 20px; display: none; }
  #status.show { display: block; }
  .bar {
    height: 10px;
    background: #0e1620;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.25s ease;
  }
  .statusline {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .result {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #0e1620;
    font-size: 0.88rem;
    display: none;
  }
  .result.show { display: block; }
  .result.error { border-color: var(--danger); color: #ffd7d7; }
  .result a.dl {
    display: inline-block;
    margin-top: 10px;
    background: var(--accent-2);
    color: #062611;
    font-weight: 700;
    text-decoration: none;
    padding: 9px 14px;
    border-radius: 8px;
  }
  .result img.preview {
    display: block;
    width: 100%;
    height: auto;
    margin: 12px 0;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: #000;
  }
  .meta { color: var(--muted); }
  footer { margin-top: 22px; text-align: center; color: var(--muted); font-size: 0.75rem; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="lang" role="group" aria-label="language">
      <button type="button" data-lang="ja">日本語</button>
      <button type="button" data-lang="en">English</button>
    </div>
  </div>

  <h1 data-i18n="h1"></h1>
  <p class="sub" data-i18n="sub"></p>

  <div class="card">
    <label for="url" data-i18n="urlLabel"></label>
    <textarea id="url" data-i18n-ph="urlPh"></textarea>

    <div class="row">
      <div>
        <label for="zoom" data-i18n="zoomLabel"></label>
        <select id="zoom">
          <option value="3" data-i18n="zoomLow"></option>
          <option value="4" data-i18n="zoomMid"></option>
          <option value="5" selected data-i18n="zoomHigh"></option>
        </select>
      </div>
    </div>

    <button id="go" data-i18n="go"></button>

    <div id="status">
      <div class="bar"><i id="bar"></i></div>
      <div class="statusline"><span id="stage"></span><span id="pct">0%</span></div>
    </div>

    <div id="result" class="result"></div>

    <p class="hint" data-i18n="hint"></p>
  </div>

  <footer>
    <span data-i18n="footer"></span>
    <a href="https://github.com/seitanmen/streetview-dl" target="_blank" rel="noopener">GitHub</a>
  </footer>
</div>

<script>
  const I18N = {
    ja: {
      title: "streetview-dl — 360° パノラマ ダウンローダー",
      h1: "360° パノラマ ダウンローダー",
      sub: "Google ストリートビューの URL を貼り付けて、等距円筒 360° 画像をダウンロード",
      urlLabel: "ストリートビュー URL または パノラマ ID",
      urlPh: "https://www.google.com/maps/@.../data=...!1s<PANO_ID>!...  または raw な pano id",
      zoomLabel: "画質（出力サイズは画質に応じて決まります）",
      zoomLow: "低 — zoom 3（4096×2048・最速）",
      zoomMid: "中 — zoom 4（8192×4096）",
      zoomHigh: "高 — zoom 5（16384×8192・低速）",
      go: "ダウンロード生成",
      hint: "URL は Google マップで黄色いペグマンをストリートビューに置き、アドレスバーから取得します。pano ID は URL の !1s<id>! 部分です。zoom 5 は 512 枚のタイル取得で数十秒かかります。",
      footer: "出力は GPano XMP メタデータ付きで 360° ビューアが認識します · ",
      stages: {
        queued: "キューに追加",
        downloading: "タイルをダウンロード中…",
        compositing: "画像を合成中…",
        resizing: "リサイズ中…",
        done: "完了",
      },
      needUrl: "URL または pano ID を入力してください。",
      errorPrefix: "エラー: ",
      doneTitle: "生成完了",
      tilesInfo: (n, grid) => "タイル " + n + " 枚（グリッド " + grid + "）",
      dlBtn: "⬇ JPEG をダウンロード",
      reqFail: "リクエストに失敗しました: ",
      disconnected: "サーバとの接続が切れました。",
    },
    en: {
      title: "streetview-dl — 360° Panorama Downloader",
      h1: "360° Panorama Downloader",
      sub: "Paste a Google Street View URL to download the equirectangular 360° image",
      urlLabel: "Street View URL or panorama ID",
      urlPh: "https://www.google.com/maps/@.../data=...!1s<PANO_ID>!...  or a raw pano id",
      zoomLabel: "Quality (output size follows the quality / zoom)",
      zoomLow: "Low — zoom 3 (4096×2048, fastest)",
      zoomMid: "Medium — zoom 4 (8192×4096)",
      zoomHigh: "High — zoom 5 (16384×8192, slowest)",
      go: "Generate & download",
      hint: "Get the URL in Google Maps by dropping the yellow pegman into Street View and copying it from the address bar. The pano ID is the !1s<id>! part of the URL. zoom 5 downloads 512 tiles and can take tens of seconds.",
      footer: "Outputs carry GPano XMP metadata so 360° viewers recognise them · ",
      stages: {
        queued: "Queued",
        downloading: "Downloading tiles…",
        compositing: "Compositing…",
        resizing: "Resizing…",
        done: "Done",
      },
      needUrl: "Please enter a URL or pano ID.",
      errorPrefix: "Error: ",
      doneTitle: "Done",
      tilesInfo: (n, grid) => n + " tiles (grid " + grid + ")",
      dlBtn: "⬇ Download JPEG",
      reqFail: "Request failed: ",
      disconnected: "Connection to the server was lost.",
    },
  };

  const $ = (id) => document.getElementById(id);
  const go = $("go");
  const statusBox = $("status");
  const bar = $("bar");
  const stageEl = $("stage");
  const pctEl = $("pct");
  const resultBox = $("result");

  // Remembered state so progress/result can be re-rendered on a language switch.
  let lang = "ja";
  let es = null;
  let current = null; // { stage, percent }
  let lastDone = null; // done payload
  let lastError = null; // raw error message

  function t() { return I18N[lang]; }

  function applyStaticI18n() {
    const d = t();
    document.documentElement.lang = lang;
    document.title = d.title;
    document.querySelectorAll("[data-i18n]").forEach((el) => {
      const v = d[el.getAttribute("data-i18n")];
      if (typeof v === "string") el.textContent = v;
    });
    document.querySelectorAll("[data-i18n-ph]").forEach((el) => {
      const v = d[el.getAttribute("data-i18n-ph")];
      if (typeof v === "string") el.setAttribute("placeholder", v);
    });
    document.querySelectorAll(".lang button").forEach((b) =>
      b.classList.toggle("active", b.dataset.lang === lang)
    );
  }

  function setLang(next) {
    lang = I18N[next] ? next : "ja";
    try { localStorage.setItem("svdl_lang", lang); } catch (e) {}
    applyStaticI18n();
    // Re-render dynamic pieces in the new language.
    if (current) setProgress(current.stage, current.percent);
    if (lastDone) showDone(lastDone);
    else if (lastError !== null) showError(lastError);
  }

  function setProgress(stage, percent) {
    current = { stage, percent };
    statusBox.classList.add("show");
    bar.style.width = (percent || 0) + "%";
    stageEl.textContent = t().stages[stage] || stage || "";
    pctEl.textContent = (percent || 0) + "%";
  }

  function showError(msg) {
    lastError = msg;
    lastDone = null;
    resultBox.className = "result show error";
    resultBox.textContent = t().errorPrefix + msg;
    go.disabled = false;
  }

  function showDone(d) {
    lastDone = d;
    lastError = null;
    setProgress("done", 100);
    const dict = t();
    resultBox.className = "result show";
    resultBox.innerHTML =
      "<strong>" + escapeHtml(dict.doneTitle) + "</strong><br>" +
      '<span class="meta">' +
      escapeHtml(d.filename) + " · " + d.width + "×" + d.height + " · " +
      escapeHtml(dict.tilesInfo(d.tileCount, d.grid)) + "</span><br>" +
      (d.preview
        ? '<img class="preview" src="' + d.preview + '" alt="preview">'
        : "") +
      '<a class="dl" href="' + d.downloadUrl + '">' + escapeHtml(dict.dlBtn) + "</a>";
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );
  }

  async function start() {
    const url = $("url").value.trim();
    if (!url) { showError(t().needUrl); return; }

    go.disabled = true;
    resultBox.className = "result";
    lastDone = null;
    lastError = null;
    setProgress("queued", 0);
    if (es) { es.close(); es = null; }

    let data;
    try {
      const r = await fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url, zoom: parseInt($("zoom").value, 10) }),
      });
      data = await r.json();
      if (!r.ok) { showError(data.error || ("HTTP " + r.status)); return; }
    } catch (e) {
      showError(t().reqFail + e.message);
      return;
    }

    es = new EventSource("/api/jobs/" + data.jobId + "/events");
    es.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === "progress") setProgress(msg.stage, msg.percent);
      else if (msg.type === "done") {
        es.close(); es = null;
        showDone(msg);
        // Auto-start the download.
        const a = document.createElement("a");
        a.href = msg.downloadUrl;
        a.download = msg.filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        go.disabled = false;
      } else if (msg.type === "error") {
        es.close(); es = null;
        showError(msg.error);
      }
    };
    es.onerror = () => {
      if (es) {
        es.close();
        es = null;
        if (!resultBox.classList.contains("show")) showError(t().disconnected);
      }
    };
  }

  // Initial language: saved choice > browser language > Japanese.
  let initial = "ja";
  try {
    const saved = localStorage.getItem("svdl_lang");
    if (saved && I18N[saved]) initial = saved;
    else if (!(navigator.language || "").toLowerCase().startsWith("ja")) initial = "en";
  } catch (e) {}

  document.querySelectorAll(".lang button").forEach((b) =>
    b.addEventListener("click", () => setLang(b.dataset.lang))
  );
  go.addEventListener("click", start);
  $("url").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") start();
  });

  setLang(initial);
</script>
</body>
</html>
