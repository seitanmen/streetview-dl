<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>streetview-dl — 360° パノラマ ダウンローダー</title>
<style>
  :root {
    --bg: #0f1720;
    --card: #18232f;
    --line: #2a3a4a;
    --fg: #e6edf3;
    --muted: #8aa0b4;
    --accent: #3b82f6;
    --accent-2: #22c55e;
    --danger: #ef4444;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Sans",
      "Noto Sans JP", sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2a3a, var(--bg));
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }
  .wrap { width: 100%; max-width: 640px; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .sub { color: var(--muted); margin: 0 0 24px; font-size: 0.9rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
  }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin: 0 0 6px; }
  textarea, select {
    width: 100%;
    background: #0e1620;
    border: 1px solid var(--line);
    color: var(--fg);
    border-radius: 10px;
    padding: 11px 12px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 76px; line-height: 1.4; }
  textarea:focus, select:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .row { display: flex; gap: 12px; margin-top: 16px; }
  .row > div { flex: 1; }
  button {
    margin-top: 20px;
    width: 100%;
    background: var(--accent);
    color: white;
    border: 0;
    border-radius: 10px;
    padding: 13px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }
  button:hover { background: #2f6fd6; }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  .hint { font-size: 0.78rem; color: var(--muted); margin-top: 14px; line-height: 1.5; }
  .hint code { background: #0e1620; padding: 1px 5px; border-radius: 5px; }

  #status { margin-top: 20px; display: none; }
  #status.show { display: block; }
  .bar {
    height: 10px;
    background: #0e1620;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.25s ease;
  }
  .statusline {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }
  .result {
    margin-top: 16px;
    padding: 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: #0e1620;
    font-size: 0.88rem;
    display: none;
  }
  .result.show { display: block; }
  .result.error { border-color: var(--danger); color: #ffd7d7; }
  .result a.dl {
    display: inline-block;
    margin-top: 10px;
    background: var(--accent-2);
    color: #062611;
    font-weight: 700;
    text-decoration: none;
    padding: 9px 14px;
    border-radius: 8px;
  }
  .meta { color: var(--muted); }
  footer { margin-top: 22px; text-align: center; color: var(--muted); font-size: 0.75rem; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <h1>360° パノラマ ダウンローダー</h1>
  <p class="sub">Google ストリートビューの URL を貼り付けて、等距円筒 360° 画像をダウンロード</p>

  <div class="card">
    <label for="url">ストリートビュー URL または パノラマ ID</label>
    <textarea id="url" placeholder="https://www.google.com/maps/@.../data=...!1s<PANO_ID>!...  または raw な pano id"></textarea>

    <div class="row">
      <div>
        <label for="zoom">画質 (zoom)</label>
        <select id="zoom">
          <option value="3">低 (zoom 3 / 約4096px・最速)</option>
          <option value="4">中 (zoom 4 / 約8192px)</option>
          <option value="5" selected>高 (zoom 5 / 最大16384px・低速)</option>
        </select>
      </div>
      <div>
        <label for="size">出力サイズ</label>
        <select id="size">
          <option value="full" selected>フル解像度 (stl)</option>
          <option value="medium">8192px 幅 (stm)</option>
          <option value="small">1300px 幅 (sts)</option>
        </select>
      </div>
    </div>

    <button id="go">ダウンロード生成</button>

    <div id="status">
      <div class="bar"><i id="bar"></i></div>
      <div class="statusline"><span id="stage">準備中…</span><span id="pct">0%</span></div>
    </div>

    <div id="result" class="result"></div>

    <p class="hint">
      URL は Google マップで黄色いペグマンをストリートビューに置き、アドレスバーから取得します。
      pano ID は URL の <code>!1s&lt;id&gt;!</code> 部分です。zoom 5 は 512 枚のタイル取得で数十秒かかります。
    </p>
  </div>

  <footer>
    出力は GPano XMP メタデータ付きで 360° ビューアが認識します ·
    <a href="https://github.com/seitanmen/streetview-dl" target="_blank" rel="noopener">GitHub</a>
  </footer>
</div>

<script>
  const $ = (id) => document.getElementById(id);
  const go = $("go");
  const statusBox = $("status");
  const bar = $("bar");
  const stageEl = $("stage");
  const pctEl = $("pct");
  const resultBox = $("result");

  const STAGE_LABEL = {
    queued: "キューに追加",
    downloading: "タイルをダウンロード中…",
    compositing: "画像を合成中…",
    resizing: "リサイズ中…",
    done: "完了",
  };

  let es = null;

  function setProgress(stage, percent) {
    statusBox.classList.add("show");
    bar.style.width = (percent || 0) + "%";
    stageEl.textContent = STAGE_LABEL[stage] || stage || "";
    pctEl.textContent = (percent || 0) + "%";
  }

  function showError(msg) {
    resultBox.className = "result show error";
    resultBox.innerHTML = "エラー: " + escapeHtml(msg);
    go.disabled = false;
  }

  function showDone(d) {
    setProgress("done", 100);
    resultBox.className = "result show";
    resultBox.innerHTML =
      '<strong>生成完了</strong><br>' +
      '<span class="meta">' +
      escapeHtml(d.filename) + " · " + d.width + "×" + d.height +
      " · タイル " + d.tileCount + " 枚 (グリッド " + escapeHtml(d.grid) + ")</span><br>" +
      '<a class="dl" href="' + d.downloadUrl + '">⬇ JPEG をダウンロード</a>';
    // Auto-start the download.
    const a = document.createElement("a");
    a.href = d.downloadUrl;
    a.download = d.filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    go.disabled = false;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])
    );
  }

  async function start() {
    const url = $("url").value.trim();
    if (!url) { showError("URL または pano ID を入力してください。"); return; }

    go.disabled = true;
    resultBox.className = "result";
    setProgress("queued", 0);
    if (es) { es.close(); es = null; }

    let data;
    try {
      const r = await fetch("/api/jobs", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          url,
          zoom: parseInt($("zoom").value, 10),
          size: $("size").value,
        }),
      });
      data = await r.json();
      if (!r.ok) { showError(data.error || ("HTTP " + r.status)); return; }
    } catch (e) {
      showError("リクエストに失敗しました: " + e.message);
      return;
    }

    es = new EventSource("/api/jobs/" + data.jobId + "/events");
    es.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === "progress") setProgress(msg.stage, msg.percent);
      else if (msg.type === "done") { es.close(); es = null; showDone(msg); }
      else if (msg.type === "error") { es.close(); es = null; showError(msg.error); }
    };
    es.onerror = () => {
      // The stream is closed by the server after a terminal event; only treat
      // it as an error if we never reached a result.
      if (es) {
        es.close();
        es = null;
        if (!resultBox.classList.contains("show")) {
          showError("サーバとの接続が切れました。");
        }
      }
    };
  }

  go.addEventListener("click", start);
  $("url").addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") start();
  });
</script>
</body>
</html>
